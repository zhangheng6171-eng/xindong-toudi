version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: xindong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-xindong}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xindong123}
      POSTGRES_DB: ${DB_NAME:-xindongtoudi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./architecture/database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xindong}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: xindong-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Web应用
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xindong-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-xindong}:${DB_PASSWORD:-xindong123}@postgres:5432/${DB_NAME:-xindongtoudi}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm start

  # 定时任务Worker (每周匹配)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xindong-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-xindong}:${DB_PASSWORD:-xindong123}@postgres:5432/${DB_NAME:-xindongtoudi}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: xindong-network
